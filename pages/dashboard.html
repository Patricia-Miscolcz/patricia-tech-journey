<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LoginCloud</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-page">
    <main class="dashboard">

    <section class="perfil">

        <img src="../assets/img/patricia.jpg"
             alt="Patricia"
             class="foto">

        <h1>Patricia Miscolcz</h1>

        <h3>Professora Universitária</h3>

        <p>
            Matemática • Inteligência Artificial •
            Ciência de Dados • Desenvolvimento
        </p>

    </section>

    <section class="cards">

        <div class="card">
            <h2>🎓 Formação</h2>
            <p>Conheça minha formação acadêmica.</p>
        </div>

        <div class="card">
            <h2>💼 Projetos</h2>
            <p>Projetos desenvolvidos.</p>
        </div>

        <div class="card">
            <h2>📚 Disciplinas</h2>
            <p>Disciplinas ministradas.</p>
        </div>

        <div class="card">
            <h2>🏆 Certificados</h2>
            <p>Cursos e certificações.</p>
        </div>

    </section>

    <button id="logoutBtn">Sair</button>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
